version: 0.2

phases:
  install:
    commands:
      - echo "Installing skopeo..."
      - apt-get update && apt-get install -y --no-install-recommends skopeo python3-yaml

  pre_build:
    commands:
      - echo "Logging in to ECR..."
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | skopeo login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"

  build:
    commands:
      - echo "Mirroring images..."
      - python3 image-builder/mirror-images.py

  post_build:
    commands:
      - echo "Mirror complete"
