apiVersion: v1
kind: ServiceAccount
metadata:
  name: tinkerbell-endpoint-sync
  namespace: tinkerbell
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tinkerbell-endpoint-sync
  namespace: tinkerbell
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tinkerbell-endpoint-sync
  namespace: tinkerbell
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tinkerbell-endpoint-sync
subjects:
  - kind: ServiceAccount
    name: tinkerbell-endpoint-sync
    namespace: tinkerbell
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tinkerbell-endpoint-sync
  namespace: argocd
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tinkerbell-endpoint-sync
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tinkerbell-endpoint-sync
subjects:
  - kind: ServiceAccount
    name: tinkerbell-endpoint-sync
    namespace: tinkerbell