apiVersion: kro.run/v1alpha1
kind: ResourceGroup
metadata:
  name: eks-cluster-with-vpc
  namespace: kro-system
spec:
  # Schema defines the input parameters for this ResourceGroup
  schema:
    apiVersion: v1alpha1
    kind: EKSClusterWithVPC
    spec:
      clusterName:
        type: string
        description: "Name of the EKS cluster"
      region:
        type: string
        description: "AWS region for the cluster"
      vpcCIDR:
        type: string
        description: "CIDR block for the VPC"
      kubernetesVersion:
        type: string
        description: "Kubernetes version"
        default: "1.31"
      clusterRoleARN:
        type: string
        description: "IAM role ARN for EKS cluster"
  
  # Resources defines all the AWS resources to create
  resources:
    # 1. VPC
    - id: vpc
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: VPC
        metadata:
          name: ${schema.spec.clusterName}-vpc
        spec:
          cidrBlocks:
            - ${schema.spec.vpcCIDR}
          enableDNSSupport: true
          enableDNSHostnames: true
          tags:
            - key: Name
              value: ${schema.spec.clusterName}-vpc
            - key: ManagedBy
              value: kro
    
    # 2. Internet Gateway
    - id: igw
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: InternetGateway
        metadata:
          name: ${schema.spec.clusterName}-igw
        spec:
          vpcRef:
            from:
              name: ${vpc.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.clusterName}-igw
    
    # 3. Public Subnet 1 (AZ a)
    - id: publicSubnet1
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.clusterName}-public-1a
        spec:
          availabilityZone: ${schema.spec.region}a
          cidrBlock: "12.10.0.0/24"
          mapPublicIPOnLaunch: true
          vpcRef:
            from:
              name: ${vpc.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.clusterName}-public-1a
            - key: kubernetes.io/role/elb
              value: "1"
    
    # 4. Public Subnet 2 (AZ b)
    - id: publicSubnet2
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.clusterName}-public-1b
        spec:
          availabilityZone: ${schema.spec.region}b
          cidrBlock: "12.10.1.0/24"
          mapPublicIPOnLaunch: true
          vpcRef:
            from:
              name: ${vpc.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.clusterName}-public-1b
            - key: kubernetes.io/role/elb
              value: "1"
    
    # 5. Private Subnet 1 (AZ a)
    - id: privateSubnet1
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.clusterName}-private-1a
        spec:
          availabilityZone: ${schema.spec.region}a
          cidrBlock: "12.10.10.0/24"
          vpcRef:
            from:
              name: ${vpc.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.clusterName}-private-1a
            - key: kubernetes.io/role/internal-elb
              value: "1"
    
    # 6. Private Subnet 2 (AZ b)
    - id: privateSubnet2
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.clusterName}-private-1b
        spec:
          availabilityZone: ${schema.spec.region}b
          cidrBlock: "12.10.11.0/24"
          vpcRef:
            from:
              name: ${vpc.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.clusterName}-private-1b
            - key: kubernetes.io/role/internal-elb
              value: "1"
    
    # 7. Elastic IP for NAT Gateway
    - id: natEIP
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: ElasticIPAddress
        metadata:
          name: ${schema.spec.clusterName}-nat-eip
        spec:
          tags:
            - key: Name
              value: ${schema.spec.clusterName}-nat-eip
    
    # 8. NAT Gateway
    - id: natGateway
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: NATGateway
        metadata:
          name: ${schema.spec.clusterName}-nat
        spec:
          allocationRef:
            from:
              name: ${natEIP.metadata.name}
          subnetRef:
            from:
              name: ${publicSubnet1.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.clusterName}-nat
    
    # 9. Public Route Table
    - id: publicRouteTable
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.clusterName}-public-rt
        spec:
          vpcRef:
            from:
              name: ${vpc.metadata.name}
          routes:
            - destinationCIDRBlock: "0.0.0.0/0"
              gatewayRef:
                from:
                  name: ${igw.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.clusterName}-public-rt
    
    # 10. Private Route Table
    - id: privateRouteTable
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.clusterName}-private-rt
        spec:
          vpcRef:
            from:
              name: ${vpc.metadata.name}
          routes:
            - destinationCIDRBlock: "0.0.0.0/0"
              natGatewayRef:
                from:
                  name: ${natGateway.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.clusterName}-private-rt
    
    # 11. Cluster Security Group
    - id: clusterSG
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.clusterName}-sg
        spec:
          description: "EKS cluster security group"
          vpcRef:
            from:
              name: ${vpc.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.clusterName}-sg
    
    # 12. EKS Cluster
    - id: eksCluster
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: Cluster
        metadata:
          name: ${schema.spec.clusterName}
        spec:
          name: ${schema.spec.clusterName}
          version: ${schema.spec.kubernetesVersion}
          roleARN: ${schema.spec.clusterRoleARN}
          resourcesVPCConfig:
            subnetRefs:
              - from:
                  name: ${publicSubnet1.metadata.name}
              - from:
                  name: ${publicSubnet2.metadata.name}
              - from:
                  name: ${privateSubnet1.metadata.name}
              - from:
                  name: ${privateSubnet2.metadata.name}
            securityGroupRefs:
              - from:
                  name: ${clusterSG.metadata.name}
            endpointPublicAccess: true
            endpointPrivateAccess: true
          tags:
            - key: Name
              value: ${schema.spec.clusterName}
            - key: ManagedBy
              value: kro
