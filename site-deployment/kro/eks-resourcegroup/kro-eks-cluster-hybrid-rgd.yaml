apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: eks-cluster-hybrid
  namespace: kro-system
spec:
  schema:
    apiVersion: v1alpha1
    kind: EKSClusterHybrid
    spec:
      clusterName: string
      region: string
      vpcCIDR: string
      kubernetesVersion: string
      clusterRoleARN: string
      cloudwatchRoleARN: string
      # API access configuration
      endpointPublicAccess: boolean | default=true
      endpointPrivateAccess: boolean | default=true
      # Hybrid node configuration
      remoteNodeCIDR: string | default="172.16.10.0/24"
      remotePodCIDR: string | default="172.16.11.0/24"
      # Subnet CIDRs
      publicSubnet1CIDR: string | default="10.0.0.0/24"
      publicSubnet2CIDR: string | default="10.0.1.0/24"
      privateSubnet1CIDR: string | default="10.0.10.0/24"
      privateSubnet2CIDR: string | default="10.0.11.0/24"
  
  resources:
    # 1. VPC
    - id: vpc
      readyWhen:
        - ${vpc.status.state == "available"}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: VPC
        metadata:
          name: ${schema.spec.clusterName}-vpc
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec:
          cidrBlocks:
            - ${schema.spec.vpcCIDR}
          enableDNSSupport: true
          enableDNSHostnames: true
    
    # 2. Internet Gateway
    - id: igw
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: InternetGateway
        metadata:
          name: ${schema.spec.clusterName}-igw
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec:
          vpc: ${vpc.status.vpcID}
    
    # 3. Public Subnet 1 (AZ a)
    - id: publicSubnet1
      readyWhen:
        - ${publicSubnet1.status.state == "available"}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.clusterName}-public-1a
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec:
          availabilityZone: ${schema.spec.region}a
          cidrBlock: ${schema.spec.publicSubnet1CIDR}
          mapPublicIPOnLaunch: true
          vpcID: ${vpc.status.vpcID}
          routeTableRefs:
            - from:
                name: ${schema.spec.clusterName}-public-rt
    
    # 4. Public Subnet 2 (AZ c)
    - id: publicSubnet2
      readyWhen:
        - ${publicSubnet2.status.state == "available"}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.clusterName}-public-1c
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec:
          availabilityZone: ${schema.spec.region}c
          cidrBlock: ${schema.spec.publicSubnet2CIDR}
          mapPublicIPOnLaunch: true
          vpcID: ${vpc.status.vpcID}
          routeTableRefs:
            - from:
                name: ${schema.spec.clusterName}-public-rt
    
    # 5. Private Subnet 1 (AZ a)
    - id: privateSubnet1
      readyWhen:
        - ${privateSubnet1.status.state == "available"}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.clusterName}-private-1a
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec:
          availabilityZone: ${schema.spec.region}a
          cidrBlock: ${schema.spec.privateSubnet1CIDR}
          vpcID: ${vpc.status.vpcID}
          routeTableRefs:
            - from:
                name: ${schema.spec.clusterName}-private-rt
    
    # 6. Private Subnet 2 (AZ c)
    - id: privateSubnet2
      readyWhen:
        - ${privateSubnet2.status.state == "available"}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.clusterName}-private-1c
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec:
          availabilityZone: ${schema.spec.region}c
          cidrBlock: ${schema.spec.privateSubnet2CIDR}
          vpcID: ${vpc.status.vpcID}
          routeTableRefs:
            - from:
                name: ${schema.spec.clusterName}-private-rt
    
    # 7. Elastic IP for NAT Gateway
    - id: natEIP
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: ElasticIPAddress
        metadata:
          name: ${schema.spec.clusterName}-nat-eip
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec: {}
    
    # 8. NAT Gateway
    - id: natGateway
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: NATGateway
        metadata:
          name: ${schema.spec.clusterName}-nat
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec:
          allocationID: ${natEIP.status.allocationID}
          subnetID: ${publicSubnet1.status.subnetID}
    
    # 9. Public Route Table
    - id: publicRouteTable
      readyWhen:
        - ${publicRouteTable.status.routeTableID != ""}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.clusterName}-public-rt
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec:
          vpcID: ${vpc.status.vpcID}
          routes:
            - destinationCIDRBlock: "0.0.0.0/0"
              gatewayID: ${igw.status.internetGatewayID}
    
    # 10. Private Route Table
    - id: privateRouteTable
      readyWhen:
        - ${privateRouteTable.status.routeTableID != ""}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.clusterName}-private-rt
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec:
          vpcID: ${vpc.status.vpcID}
          routes:
            - destinationCIDRBlock: "0.0.0.0/0"
              natGatewayID: ${natGateway.status.natGatewayID}
    
    # 11. Cluster Security Group
    - id: clusterSG
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.clusterName}-sg
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec:
          name: ${schema.spec.clusterName}-sg
          description: "EKS hybrid cluster security group"
          vpcID: ${vpc.status.vpcID}
    
    # 12. EKS Cluster with Hybrid Nodes
    - id: eksCluster
      readyWhen:
        - ${eksCluster.status.status == "ACTIVE"}
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: Cluster
        metadata:
          name: ${schema.spec.clusterName}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec:
          name: ${schema.spec.clusterName}
          version: ${schema.spec.kubernetesVersion}
          roleARN: ${schema.spec.clusterRoleARN}
          accessConfig:
            authenticationMode: API_AND_CONFIG_MAP
          resourcesVPCConfig:
            subnetIDs:
              - ${publicSubnet1.status.subnetID}
              - ${publicSubnet2.status.subnetID}
              - ${privateSubnet1.status.subnetID}
              - ${privateSubnet2.status.subnetID}
            securityGroupIDs:
              - ${clusterSG.status.id}
            endpointPublicAccess: ${schema.spec.endpointPublicAccess}
            endpointPrivateAccess: ${schema.spec.endpointPrivateAccess}
          remoteNetworkConfig:
            remoteNodeNetworks:
              - cidrs:
                  - ${schema.spec.remoteNodeCIDR}
            remotePodNetworks:
              - cidrs:
                  - ${schema.spec.remotePodCIDR}
    
    # 13. EKS Access Entry for Cluster Role
    - id: clusterRoleAccessEntry
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: AccessEntry
        metadata:
          name: ${schema.spec.clusterName}-cluster-role
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec:
          clusterName: ${schema.spec.clusterName}
          principalARN: ${schema.spec.clusterRoleARN}
          type: STANDARD
          accessPolicies:
            - policyARN: arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
              accessScope:
                type: cluster
    
    # 14. ArgoCD Cluster Registration
    - id: argoCDCluster
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ${schema.spec.clusterName}-cluster
          namespace: argocd
          labels:
            argocd.argoproj.io/secret-type: cluster
        type: Opaque
        stringData:
          name: ${schema.spec.clusterName}
          server: ${eksCluster.status.endpoint}
          config: |
            {
              "awsAuthConfig": {
                "clusterName": "${schema.spec.clusterName}"
              },
              "tlsClientConfig": {
                "insecure": false,
                "caData": "${eksCluster.status.certificateAuthority.data}"
              }
            }
    
    # 15. EKS Pod Identity Agent Add-on
    - id: podIdentityAgent
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: Addon
        metadata:
          name: ${schema.spec.clusterName}-pod-identity-agent
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec:
          name: eks-pod-identity-agent
          clusterName: ${schema.spec.clusterName}
    
    # 16. Pod Identity Association for CloudWatch Observability
    - id: cloudwatchPodIdentity
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: PodIdentityAssociation
        metadata:
          name: ${schema.spec.clusterName}-cloudwatch-pia
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec:
          clusterName: ${schema.spec.clusterName}
          namespace: amazon-cloudwatch
          serviceAccount: cloudwatch-agent
          roleARN: ${schema.spec.cloudwatchRoleARN}
    
    # 17. CloudWatch Observability Add-on
    - id: cloudwatchAddon
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: Addon
        metadata:
          name: ${schema.spec.clusterName}-cloudwatch-observability
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec:
          name: amazon-cloudwatch-observability
          clusterName: ${schema.spec.clusterName}
    
    # 18. CoreDNS Add-on
    - id: coreDNSAddon
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: Addon
        metadata:
          name: ${schema.spec.clusterName}-coredns
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec:
          name: coredns
          clusterName: ${schema.spec.clusterName}
          resolveConflicts: OVERWRITE
    
    # 19. Kube-proxy Add-on
    - id: kubeProxyAddon
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: Addon
        metadata:
          name: ${schema.spec.clusterName}-kube-proxy
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
        spec:
          name: kube-proxy
          clusterName: ${schema.spec.clusterName}
          resolveConflicts: OVERWRITE
