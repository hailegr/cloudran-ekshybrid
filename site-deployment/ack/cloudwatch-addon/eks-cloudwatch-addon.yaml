---
# 1. IAM Role for CloudWatch Observability with Pod Identity
apiVersion: iam.services.k8s.aws/v1alpha1
kind: Role
metadata:
  name: cloudwatch-observability-role
  namespace: ack-system
spec:
  name: EKSCloudWatchObservabilityRole
  description: "IAM role for CloudWatch Observability add-on using EKS Pod Identity"
  assumeRolePolicyDocument: |
    {
      "Version": "2012-10-17",
      "Statement": [{
        "Effect": "Allow",
        "Principal": {
          "Service": "pods.eks.amazonaws.com"
        },
        "Action": [
          "sts:AssumeRole",
          "sts:TagSession"
        ]
      }]
    }
  policies:
    - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
    - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
  tags:
    - key: ManagedBy
      value: ack
    - key: Purpose
      value: cloudwatch-observability

---
# 2. EKS Pod Identity Agent Add-on
apiVersion: eks.services.k8s.aws/v1alpha1
kind: Addon
metadata:
  name: eks-pod-identity-agent-1111
  namespace: ack-system
  annotations:
    services.k8s.aws/region: us-west-1
spec:
  clusterName: eksclusterhybrid-1111
  addonName: eks-pod-identity-agent

---
# 3. Pod Identity Association for CloudWatch Observability
apiVersion: eks.services.k8s.aws/v1alpha1
kind: PodIdentityAssociation
metadata:
  name: cloudwatch-observability-1111
  namespace: ack-system
  annotations:
    services.k8s.aws/region: us-west-1
spec:
  clusterName: eksclusterhybrid-1111
  namespace: amazon-cloudwatch
  serviceAccount: cloudwatch-agent
  roleARN: arn:aws:iam::242201304709:role/EKSCloudWatchObservabilityRole

---
# 4. CloudWatch Observability Add-on
apiVersion: eks.services.k8s.aws/v1alpha1
kind: Addon
metadata:
  name: cloudwatch-observability-1111
  namespace: ack-system
  annotations:
    services.k8s.aws/region: us-west-1
spec:
  clusterName: eksclusterhybrid-1111
  addonName: amazon-cloudwatch-observability
